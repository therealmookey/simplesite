<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleSite - Maak je eigen website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header wordt hier geladen -->
    <div id="header"></div>

    <!-- HERO - Direct beginnen -->
    <section class="hero">
        <h1>Jouw website in <span>10 minuten</span></h1>
        <p>Geen gedoe met code. Bouw, pas aan en download.</p>
        <a href="admin.html" class="btn-primary">🚀 Begin nu</a>
    </section>

    <!-- HOE HET WERKT -->
    <section class="how-it-works">
        <h2>Hoe het werkt</h2>
        <div class="steps">
            <div class="step">
                <span class="number">1</span>
                <div class="step-content">
                    <h3>Bouw</h3>
                    <p>Voeg tekst, afbeeldingen en pagina's toe</p>
                </div>
            </div>
            <div class="step">
                <span class="number">2</span>
                <div class="step-content">
                    <h3>Pas aan</h3>
                    <p>Kies je kleuren en lettertypen</p>
                </div>
            </div>
            <div class="step">
                <span class="number">3</span>
                <div class="step-content">
                    <h3>Download</h3>
                    <p>Betaal eenmalig en download alles</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer wordt hier geladen -->
    <div id="footer"></div>

    <script src="js/main.js"></script>
</body>
</html>
